name: 롤백 요청
description: 롤백 요청을 등록한다.
title: "[롤백] "
body:
  - type: input
    id: change-id
    attributes:
      label: change id
      placeholder: 예) CC-2026-001
    validations:
      required: true
  - type: textarea
    id: rollback-scope
    attributes:
      label: 되돌릴 범위
      placeholder: 되돌릴 repo, service, 문서, 릴리스 범위를 작성한다.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 사유
      placeholder: 롤백이 필요한 원인을 작성한다.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      placeholder: 사용자, 서비스, 문서, 후속 작업 영향을 작성한다.
    validations:
      required: true
