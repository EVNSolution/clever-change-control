name: 변경 요청
description: 변경 요청을 등록한다.
title: ""
body:
  - type: markdown
    attributes:
      value: |
        이슈 제목은 반드시 `[상위 타입][하위 타입] 짧은 제목` 형식으로 작성한다.

        예:
        - `[MSA/SaaS][복제] 배차 서비스 고객사 배포 분기 추가`
        - `[일반 개발][리팩토링] bootstrap packet 구조 정리`

        본문의 `work_type_group`, `work_type_detail` 값은 이슈 제목의 타입과 항상 일치해야 한다.

        template 기반 작업이면 `template_id`, `template_version`, `deploy_profile`, `lifecycle_action`도 함께 기록한다.

        이 템플릿은 `project-start` root intake가 아니라, root issue 승인 후 scope가 고정된 post-project-start change request를 위한 입력 폼이다.
  - type: markdown
    attributes:
      value: |
        ## Concurrent Work Gate

        구현 시작 전과 PR merge 전에는 target repo issue와 clever-change-control issue를 같이 확인한다.

        parallel work decision 값:
        - `done`: 관련 작업이 이미 merged/closed PR로 끝남
        - `blocked`: 진행 중인 issue, branch, open PR과 범위가 겹침
        - `allowed-with-non-overlap`: 진행 중인 작업은 있으나 범위가 겹치지 않음
        - `user-forced-proceed`: 사용자가 `완전 무시모드`, `강제 진행`, `user-forced-proceed`를 명시함

        `user-forced-proceed`는 사용자 강제 진행 기록이다. conflict candidates와 merge risk를 남긴다.
  - type: markdown
    attributes:
      value: |
        template 기반 작업이면 issue body에 아래 메타를 같이 남긴다.

        ```text
        template_id: <template-id>
        template_version: <version>
        deploy_profile: <deploy-profile>
        override_scope: <override-scope-if-relevant>
        lifecycle_action: <adopt|modify|migrate|retire>
        ```

        `override_scope`는 필요 시 issue body 메모로 추가한다. 1차에서는 form field 강제보다 본문 일치와 문서 규칙을 우선한다.
  - type: input
    id: title
    attributes:
      label: 짧은 제목
      placeholder: 제목에서 타입 prefix를 제외한 짧은 제목을 입력한다.
      description: 이 값은 실제 issue title의 짧은 제목 부분과 같은 의미로 작성한다.
    validations:
      required: true
  - type: input
    id: change-id
    attributes:
      label: change id
      placeholder: 예) chg-20260406-001
      description: scope가 고정된 post-project-start change request에서 `chg-YYYYMMDD-NNN` 형식으로 발급한다.
    validations:
      required: true
  - type: dropdown
    id: work_type_group
    attributes:
      label: 개발 타입 상위
      description: 에이전트는 issue title의 첫 번째 bracket 값과 반드시 일치시킨다.
      options:
        - MSA/SaaS
        - 일반 개발
    validations:
      required: true
  - type: dropdown
    id: work_type_detail
    attributes:
      label: 개발 타입 하위
      description: 에이전트는 issue title의 두 번째 bracket 값과 반드시 일치시킨다.
      options:
        - 복제
        - 신규
        - 신규 개발
        - 수정
        - 변경
        - 리팩토링
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: 목적
      placeholder: 왜 이 변경이 필요한지 작성한다.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 제약
      placeholder: 일정, 범위, 의존성, 제외 조건을 작성한다.
    validations:
      required: true
  - type: dropdown
    id: parallel-work-decision
    attributes:
      label: parallel work decision
      description: Concurrent Work Gate 판정값이다.
      options:
        - done
        - blocked
        - allowed-with-non-overlap
        - user-forced-proceed
    validations:
      required: true
  - type: textarea
    id: conflict-candidates
    attributes:
      label: conflict candidates
      description: target repo issue, clever-change-control issue, active branch, open PR 확인 결과를 적는다. user-forced-proceed이면 사용자 강제 진행 사유도 적는다.
      placeholder: |
        target repo issue:
        clever-change-control issue:
        open PR:
        active branch:
        conflict candidates:
        merge risk:
        user-forced-proceed reason:
    validations:
      required: true
  - type: dropdown
    id: ui-impact
    attributes:
      label: UI 영향 여부
      options:
        - 있음
        - 없음
    validations:
      required: true
  - type: input
    id: target-repo
    attributes:
      label: 대상 repo
      placeholder: 예) clever-context-monorepo
    validations:
      required: true
  - type: input
    id: target-service
    attributes:
      label: 대상 service
      placeholder: 예) billing-api
      description: 이 템플릿은 target service가 이미 정해졌거나 정해져야 하는 post-project-start change request에 사용한다.
    validations:
      required: true
  - type: textarea
    id: expected-result
    attributes:
      label: 기대 결과
      placeholder: 완료 기준과 기대 산출물을 작성한다.
    validations:
      required: true
