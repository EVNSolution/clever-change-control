name: project-start
description: 새 작업 라인의 root intake를 등록한다.
title: "[project-start] "
body:
  - type: markdown
    attributes:
      value: |
        이 템플릿은 모든 작업의 root intake를 위한 `project-start` 전용 입력 폼이다.

        고정 규칙:
        - root canonical identifier는 생성된 `project-start issue #`다.
        - `change id`는 이 root issue 승인 후, scope가 고정된 실행 단위에서만 사용한다.
        - 일반 intake 단계에서는 `target service` 확정값을 강제하지 않는다. 알면 후보로만 적는다.
  - type: textarea
    id: request-summary
    attributes:
      label: request summary
      placeholder: 이번 작업을 한두 문장으로 요약한다.
      description: issue title의 핵심 내용과 같은 의미로 작성한다.
    validations:
      required: true
  - type: textarea
    id: request-context
    attributes:
      label: request context
      placeholder: 요청 세션, 요청자 배경, 현재 상황을 적는다.
      description: intake 시점의 요청 문맥만 남긴다.
    validations:
      required: true
  - type: textarea
    id: business-intent
    attributes:
      label: business intent
      placeholder: 왜 이 작업이 필요한지, 어떤 문제를 풀려는지 적는다.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: constraints
      placeholder: 일정, 범위, 의존성, 제외 조건, 위험을 적는다.
    validations:
      required: true
  - type: textarea
    id: expected-outcome
    attributes:
      label: expected outcome
      placeholder: 승인 후 기대하는 결과와 완료 판단 기준을 적는다.
    validations:
      required: true
  - type: textarea
    id: candidate-template-lineage
    attributes:
      label: candidate template lineage
      placeholder: template_id, template_version, deploy_profile, lifecycle_action 후보를 적는다.
      description: 확정 전이면 candidate라고 적고, lineage unknown이면 그대로 적는다.
    validations:
      required: true
  - type: input
    id: candidate-target-repo
    attributes:
      label: candidate target repo
      placeholder: 예) clever-agent-project
      description: 알고 있으면 적고, 미정이면 `needs-confirmation`을 적는다.
    validations:
      required: true
  - type: input
    id: candidate-target-service
    attributes:
      label: candidate target service
      placeholder: 예) service-account-access 또는 needs-confirmation
      description: 일반 intake에서는 후보면 충분하다.
    validations:
      required: true
  - type: dropdown
    id: intake-mode
    attributes:
      label: intake mode
      options:
        - agent-assisted
        - manual
    validations:
      required: true
  - type: dropdown
    id: approval-status
    attributes:
      label: approval status
      options:
        - draft
        - approved
        - needs-revision
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: notes
      placeholder: 추가 메모, 다음 단계, 검토 포인트를 적는다.
